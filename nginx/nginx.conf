# Pixelle-Video Production Nginx Configuration
# Reverse Proxy + Static File Serving + SSL

upstream pixelle_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
    
    # ACME challenge for Let's Encrypt SSL certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (managed by certbot or manually configured)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # Client max body size (for video uploads, allow up to 500MB)
    client_max_body_size 500M;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # ====== Frontend (served by API at /modern) ======
    location / {
        proxy_pass http://pixelle_api/modern;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Fix redirects and asset paths
        proxy_redirect http://pixelle_api/ /;
        sub_filter_once off;
        sub_filter 'href="/modern/' 'href="/';
        sub_filter 'src="/modern/' 'src="/';
        sub_filter 'action="/modern/' 'action="/';
    }

    # Frontend assets (proxied with caching)
    location /assets/ {
        proxy_pass http://pixelle_api/modern/assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ====== API proxy ======
    location /api/ {
        proxy_pass http://pixelle_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ====== Health check ======
    location /health {
        proxy_pass http://pixelle_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ====== API docs ======
    location /docs {
        proxy_pass http://pixelle_api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://pixelle_api;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://pixelle_api;
        proxy_set_header Host $host;
    }

    # ====== Video output files (served directly for performance) ======
    location /output/ {
        alias /app/output/;
        add_header Content-Disposition "inline";
        add_header Cache-Control "public, max-age=3600";
    }

    # ====== File uploads ======
    location /files/ {
        proxy_pass http://pixelle_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }
    location ~ /config\.yaml$ {
        deny all;
    }
}